<!DOCTYPE html>

<html>
<head>
    <title>Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="dashboard">
        <div class="top">
            Your <span class="highlight">personal</span> Dashboard
        </div>
        <div class="widget-grid">
            <div class="widget">
                <div class="widgettitle">
                    Weather
                </div>
                <div class="widgetinfo">
                    <div class="widgettext">
                    <form class="form-weather" action="/" method="get">
                        <span class="highlight">City:</span>
                        <input type="text" name="city" placeholder="Enter City..." value="{{ weather.city }}">
                        <button type="submit">→</button>
                    </form>
                    </div>
                    <div class="widgettext">
                    <span class="highlight">Country:</span>   {{ weather.country }} <br>
                    </div>
                    <div class="widgettext">
                    <span class="highlight">Temperature:</span>   {{ weather.temperature_2m }}°C <br>
                    </div>
                    <div class="widgettext">
                        <span class="highlight"> Clouds:</span>   {{ weather.description }}<br>
                    </div>
                    <div class="widgettext">
                        <span class="highlight"> Windspeed:</span>   {{ weather.windspeed_10m }} km/h<br>
                    </div>
                </div>
            </div>
            <div class="widget">
                <div class="widgettitle">
                    Portfolio
                </div>
                <div class="widgetinfo">
                    <div class="widgettext">
                        <span class="highlight">Vanguard FTSE All World: </span>  {{ financedict.dailypercentage }} % <br>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
